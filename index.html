<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>健康食谱领取</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #ffffff;
      --text: #111111;
      --subtext: #666666;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 28px 16px 40px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 460px;
    }

    /* 页眉部分 */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: #f5f5f5;
    }

    .nav-left {
      font-size: 24px;
      cursor: pointer;
    }

    .nav-center img {
      width: 50px;
    }

    .nav-right .share-btn {
      background-color: #06c755;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }

    /* 折叠菜单部分 */
    .menu-content {
      display: none; /* 默认隐藏菜单 */
      flex-direction: column;
      gap: 10px;
      background-color: #f5f5f5;
      padding: 10px;
      margin-top: 10px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background-color: #ffffff;
      border-radius: 8px;
      cursor: pointer;
    }

    .menu-item:hover {
      background-color: #e6e6e6;
    }

    .menu-toggle.active + .menu-content {
      display: flex;
    }

    /* 个人信息部分 */
    .profile {
      text-align: center;
      margin-bottom: 26px;
    }

    .avatar-wrap {
      position: relative;
      width: 122px;
      height: 122px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid #fff;
    }

    .name {
      font-size: 26px;
      font-weight: 800;
      color: #111;
      margin-bottom: 8px;
    }

    .bio {
      font-size: 14px;
      line-height: 1.8;
      color: var(--subtext);
      max-width: 360px;
      margin: 0 auto;
    }

    /* 领取健康食谱按钮部分 */
    .cta-btn {
      background-color: #06c755;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      margin-top: 20px;
    }

    .cta-btn:hover {
      background-color: #04b848;
    }

    /* 社交平台链接部分 */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 26px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      min-height: 62px;
      padding: 14px 18px;
      border-radius: 18px;
      text-decoration: none;
      color: var(--text);
      background: linear-gradient(135deg, #f8f8f8, #ffffff);
      border: 1.5px solid #ececec;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.04);
      transition: 0.2s ease;
    }

    .link-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.08);
    }

    .link-item:active {
      transform: scale(0.98);
      filter: brightness(0.97);
    }

    .icon-box {
      width: 44px;
      height: 44px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .icon-box img {
      width: 34px;
      height: 34px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 22px;
      padding-bottom: 8px;
    }

  </style>
</head>
<body>
  <div class="page">
    <div class="container">

      <!-- 页眉部分 -->
      <header class="navbar">
        <div class="nav-left menu-toggle">☰</div>
        <div class="nav-center">
          <img src="line-logo.png" alt="LINE Logo" />
        </div>
        <div class="nav-right">
          <button class="share-btn" onclick="sharePage()">分享</button>
        </div>
      </header>

      <!-- 折叠菜单内容 -->
      <div class="menu-content">
        <div class="menu-item" onclick="window.location.href='https://line.me/ti/p/~your_line_id'">
          <img src="line-icon.png" alt="Line">
          <span>LINE</span>
        </div>
        <div class="menu-item" onclick="window.location.href='https://www.instagram.com/your_profile'">
          <img src="instagram-icon.png" alt="Instagram">
          <span>Instagram</span>
        </div>
        <div class="menu-item" onclick="window.location.href='https://www.facebook.com/your_profile'">
          <img src="facebook-icon.png" alt="Facebook">
          <span>Facebook</span>
        </div>
      </div>

      <!-- 个人信息部分 -->
      <section class="profile">
        <div class="avatar-wrap">
          <img class="avatar" src="your-avatar.jpg" alt="Your Name" />
        </div>
        <div class="name">你的名字</div>
        <div class="bio">欢迎联系我，了解我的健康食谱和更多内容。</div>
      </section>

      <!-- 领取健康食谱按钮 -->
      <section>
        <div class="cta-btn" onclick="window.location.href='https://line.me/ti/p/~your_line_id'">
          领取健康食谱
        </div>
      </section>

      <!-- 页脚部分 -->
      <footer class="footer">© 2026 你的品牌</footer>

    </div>
  </div>

  <script>
    // 打开折叠菜单
    document.querySelector('.menu-toggle').addEventListener('click', function() {
      this.classList.toggle('active');
    });

    // 分享功能
    function sharePage() {
      alert('分享功能待实现');
    }
  </script>
</body>
</html>
