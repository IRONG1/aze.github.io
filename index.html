<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>健康食谱领取页</title>
  <style>
    :root {
      --bg: #f7f8f6;
      --soft: #f1f2ef;
      --text: #111111;
      --subtext: #6b6f69;
      --green: #19c957;
      --border: rgba(17, 17, 17, 0.08);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.07);
      --panel-green-1: #eaf3ec;
      --panel-green-2: #ddebe1;
      --maxw: 430px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "PingFang TC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
    body { display: flex; justify-content: center; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; color: inherit; }

    .page {
      width: 100%;
      max-width: var(--maxw);
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      overflow-x: hidden;
    }

    .topbar {
      position: relative;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 10px;
      padding: calc(env(safe-area-inset-top, 0px) + 16px) 16px 0;
      z-index: 20;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border: 0;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      cursor: pointer;
    }
    .icon-btn:active { transform: scale(0.96); }

    .menu-btn svg,
    .share-btn svg {
      width: 23px;
      height: 23px;
      stroke: #161616;
      stroke-width: 2.1;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      color: #22b74d;
      letter-spacing: -0.02em;
      user-select: none;
    }

    .share-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(0, 0, 0, 0.1);
      background: linear-gradient(180deg, #37de74 0%, #22cc5a 100%);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.08);
    }

    .drawer {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 66px);
      left: 16px;
      width: 172px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px) scale(0.98);
      transform-origin: top left;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 30;
      backdrop-filter: blur(14px);
    }
    .drawer.open { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }

    .drawer-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 8px 10px;
      border-radius: 12px;
      color: #171717;
      transition: background 0.18s ease, transform 0.18s ease;
    }
    .drawer-item:hover { background: #f4f4f4; }
    .drawer-item:active { transform: scale(0.98); }

    .drawer-icon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      flex: 0 0 auto;
      overflow: hidden;
    }
    .drawer-icon img {
      width: 16px;
      height: 16px;
      display: block;
      object-fit: contain;
    }
    .drawer-item span:last-child { font-size: 13px; font-weight: 600; }

    .hero { padding: 42px 22px 22px; text-align: center; }
    .avatar {
      width: 124px;
      height: 124px;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      margin: 0 auto;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      background: #e7e7e7;
    }
    .title {
      margin: 22px 0 0;
      font-size: 26px;
      line-height: 1.18;
      font-weight: 500;
      letter-spacing: -0.04em;
    }
    .intro-box {
      margin: 20px auto 0;
      max-width: 100%;
      background: var(--soft);
      border-radius: 22px;
      padding: 22px 20px;
      font-size: 18px;
      line-height: 1.5;
      color: #66666a;
      letter-spacing: -0.02em;
    }

    .btn-stack { margin-top: 20px; display: grid; gap: 12px; }
    .primary-btn, .secondary-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border-radius: 999px;
      letter-spacing: -0.03em;
      transition: transform 0.16s ease, background 0.16s ease;
    }
    .primary-btn {
      min-height: 58px;
      background: linear-gradient(180deg, #34da71 0%, #19c957 100%);
      border: 2px solid rgba(0, 0, 0, 0.12);
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.08);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
    }
    .secondary-btn {
      min-height: 54px;
      background: transparent;
      border: 2px solid #19c957;
      color: #111;
      font-size: 16px;
      font-weight: 700;
    }
    .primary-btn:active, .secondary-btn:active, .link-item:active { transform: scale(0.985); }

    .download-hint {
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      line-height: 1.45;
      color: #292929;
      flex-wrap: wrap;
    }
    .download-hint a {
      color: #10bc4b;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .more-panel {
      margin-top: 20px;
      background: linear-gradient(180deg, var(--panel-green-1) 0%, var(--panel-green-2) 100%);
      color: #111;
      padding: 18px 16px calc(24px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid rgba(0, 0, 0, 0.04);
    }

    .links { display: flex; flex-direction: column; gap: 12px; }
    .link-item {
      --c: #333;
      --bg1: #f8f8f8;
      --bg2: #ffffff;
      --bd: #ececec;
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      min-height: 58px;
      padding: 12px 15px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      border: 1.5px solid var(--bd);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.04);
      color: #111;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .link-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.08);
    }

    .icon-box {
      flex: 0 0 40px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      overflow: visible;
    }
    .icon-box img {
      width: 30px;
      height: 30px;
      object-fit: contain;
      display: block;
    }

    .link-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }
    .link-title { font-size: 15px; font-weight: 700; line-height: 1.2; }
    .link-desc { margin-top: 3px; font-size: 11px; color: #7a7a7a; line-height: 1.35; }
    .arrow { flex: 0 0 auto; font-size: 18px; color: var(--c); font-weight: 700; }

    .line { --c: #06c755; --bg1: #effdf4; --bg2: #ffffff; --bd: #c8f2d7; }
    .instagram { --c: #e1306c; --bg1: #fff1f7; --bg2: #fff7f3; --bd: #ffd3e3; }
    .facebook { --c: #1877f2; --bg1: #eef5ff; --bg2: #ffffff; --bd: #cfe1ff; }
    .youtube { --c: #ff5a36; --bg1: #fff1ed; --bg2: #fffaf8; --bd: #ffcbbb; }
    .tiktok { --c: #111111; --bg1: #f3f8fc; --bg2: #ffffff; --bd: #d8e7f2; }
    .email { --c: #ff8a3d; --bg1: #fff7ed; --bg2: #fffdf9; --bd: #ffd9bc; }

    .footer {
      text-align: center;
      font-size: 11px;
      color: rgba(17,17,17,0.42);
      margin-top: 18px;
      padding-bottom: 4px;
    }

    @media (max-width: 390px) {
      .hero { padding-left: 18px; padding-right: 18px; }
      .title { font-size: 24px; }
      .intro-box { font-size: 17px; padding: 20px 16px; }
      .primary-btn { min-height: 56px; font-size: 17px; }
      .secondary-btn { min-height: 52px; font-size: 15px; }
    }
  </style>
</head>
<body>

      <div class="footer">© 2026 Aze</div>

  </div>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const drawer = document.getElementById('drawer');
    const shareBtn = document.getElementById('shareBtn');

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      drawer.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (!drawer.contains(e.target) && !menuBtn.contains(e.target)) {
        drawer.classList.remove('open');
      }
    });

    shareBtn.addEventListener('click', async () => {
      const shareData = { title: document.title, text: '欢迎查看我的页面', url: window.location.href };
      try {
        if (navigator.share) {
          await navigator.share(shareData);
        } else if (navigator.clipboard) {
          await navigator.clipboard.writeText(window.location.href);
          alert('链接已复制');
        } else {
          alert(window.location.href);
        }
      } catch (err) {
        console.log(err);
      }
    });
  </script>

</html>
