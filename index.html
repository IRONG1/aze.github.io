<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aze Links</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #ffffff;
      --text: #111111;
      --subtext: #666666;
      --card: #ffffff;
      --border: #efefef;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 28px 16px 40px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 460px;
    }

    .profile {
      text-align: center;
      margin-bottom: 26px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 14px;
      border: 3px solid #fff;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      background: #f5f5f5;
    }

    .name {
      font-size: 26px;
      font-weight: 800;
      color: #111;
      margin-bottom: 8px;
    }

    .bio {
      font-size: 14px;
      line-height: 1.8;
      color: var(--subtext);
      max-width: 360px;
      margin: 0 auto;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 26px;
    }

    .link-item {
      --c: #333;
      --bg1: #f8f8f8;
      --bg2: #ffffff;
      --bd: #ececec;

      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      min-height: 62px;
      padding: 14px 18px;
      border-radius: 18px;
      text-decoration: none;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      border: 1.5px solid var(--bd);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.04);
      transition: 0.2s ease;
    }

    .link-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.08);
    }

    .link-item:active {
      transform: scale(0.98);
      filter: brightness(0.97);
    }

    .icon-box {
      flex: 0 0 44px;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--c);
      color: #fff;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.10);
    }

    .icon-box svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .icon-text {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.2px;
      color: #fff;
    }

    .link-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }

    .link-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
    }

    .link-desc {
      margin-top: 4px;
      font-size: 12px;
      color: #7a7a7a;
      line-height: 1.4;
    }

    .arrow {
      flex: 0 0 auto;
      font-size: 20px;
      color: var(--c);
      font-weight: 700;
    }

    .line {
      --c: #06c755;
      --bg1: #effdf4;
      --bg2: #ffffff;
      --bd: #c8f2d7;
    }

    .instagram {
      --c: #e1306c;
      --bg1: #fff1f7;
      --bg2: #fff7f3;
      --bd: #ffd3e3;
    }

    .facebook {
      --c: #1877f2;
      --bg1: #eef5ff;
      --bg2: #ffffff;
      --bd: #cfe1ff;
    }

    .youtube {
      --c: #ff0000;
      --bg1: #fff2f2;
      --bg2: #ffffff;
      --bd: #ffd1d1;
    }

    .threads {
      --c: #111111;
      --bg1: #f5f5f5;
      --bg2: #ffffff;
      --bd: #e6e6e6;
    }

    .tiktok {
      --c: #111111;
      --bg1: #f6f6f6;
      --bg2: #ffffff;
      --bd: #e8e8e8;
    }

    .gmail {
      --c: #ea4335;
      --bg1: #fff3f1;
      --bg2: #ffffff;
      --bd: #ffd7d1;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 22px;
      padding-bottom: 8px;
    }

    @media (max-width: 480px) {
      .page {
        padding: 22px 14px 32px;
      }

      .avatar {
        width: 88px;
        height: 88px;
      }

      .name {
        font-size: 22px;
      }

      .bio {
        font-size: 13px;
      }

      .link-item {
        min-height: 58px;
        padding: 12px 14px;
        gap: 12px;
        border-radius: 16px;
      }

      .icon-box {
        width: 40px;
        height: 40px;
        border-radius: 12px;
      }

      .link-title {
        font-size: 15px;
      }

      .link-desc {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

</html>
