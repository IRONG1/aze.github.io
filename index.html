<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>健康食谱领取页</title>
  <style>
    :root {
      --bg: #f7f7f7;
      --panel: #ffffff;
      --soft: #efefef;
      --text: #111111;
      --muted: #6f6f73;
      --green: #25d366;
      --green-deep: #1ebe5b;
      --border: rgba(17, 17, 17, 0.08);
      --shadow: 0 14px 36px rgba(0, 0, 0, 0.08);
      --dark: #07131d;
      --dark-2: #0d1b27;
      --ring: rgba(255, 255, 255, 0.14);
      --maxw: 430px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "PingFang TC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      color: inherit;
    }

    .page {
      width: 100%;
      max-width: var(--maxw);
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      overflow-x: hidden;
    }

    .topbar {
      position: relative;
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      align-items: center;
      gap: 12px;
      padding: calc(env(safe-area-inset-top, 0px) + 18px) 18px 0;
      z-index: 20;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border: 0;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      cursor: pointer;
    }

    .icon-btn:active {
      transform: scale(0.96);
    }

    .menu-btn svg,
    .share-btn svg {
      width: 26px;
      height: 26px;
      stroke: #161616;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
      color: var(--green);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      user-select: none;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--green);
      flex: 0 0 auto;
    }

    .brand-mark svg {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }

    .brand-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .share-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid rgba(0, 0, 0, 0.12);
      background: linear-gradient(180deg, #35dc72 0%, #25d366 100%);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.08);
    }

    .drawer {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 72px);
      left: 18px;
      width: 170px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px) scale(0.98);
      transform-origin: top left;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 30;
      backdrop-filter: blur(14px);
    }

    .drawer.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .drawer-item {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 9px 10px;
      border-radius: 14px;
      color: #171717;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .drawer-item:hover {
      background: #f5f5f5;
    }

    .drawer-item:active {
      transform: scale(0.98);
    }

    .drawer-icon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .drawer-icon svg {
      width: 15px;
      height: 15px;
      fill: #121212;
    }

    .hero {
      padding: 54px 26px 36px;
      text-align: center;
    }

    .avatar {
      width: 132px;
      height: 132px;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      margin: 0 auto;
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.08);
      background: #e7e7e7;
    }

    .title {
      margin: 26px 0 0;
      font-size: 30px;
      line-height: 1.18;
      font-weight: 500;
      letter-spacing: -0.04em;
    }

    .intro-box {
      margin: 24px auto 0;
      max-width: 100%;
      background: #f1f1f1;
      border-radius: 24px;
      padding: 26px 24px;
      font-size: 22px;
      line-height: 1.5;
      color: #5f5f63;
      letter-spacing: -0.02em;
    }

    .primary-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 72px;
      margin: 26px auto 0;
      background: linear-gradient(180deg, #34da71 0%, #25d366 100%);
      border: 2px solid rgba(0, 0, 0, 0.12);
      border-radius: 999px;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.08);
      color: #111;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .primary-btn:active,
    .download-btn:active {
      transform: scale(0.985);
    }

    .download-hint {
      margin-top: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 17px;
      line-height: 1.45;
      color: #292929;
      flex-wrap: wrap;
    }

    .download-hint .mini-icon {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--green);
      color: white;
      flex: 0 0 auto;
    }

    .download-hint .mini-icon svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .download-hint a {
      color: #111;
      font-weight: 600;
      text-decoration: underline;
      text-decoration-color: #21c764;
      text-underline-offset: 4px;
    }

    .more-panel {
      margin-top: 34px;
      background: linear-gradient(180deg, var(--dark) 0%, var(--dark-2) 100%);
      color: #fff;
      padding: 34px 24px calc(34px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      min-height: 74px;
      border-radius: 999px;
      background: linear-gradient(180deg, #34da71 0%, #25d366 100%);
      border: 0;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.08);
      color: #111;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.03em;
      cursor: pointer;
    }

    .download-btn svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .social-row {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .social-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 13px;
    }

    .social-circle {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.78);
      background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .social-link:hover .social-circle {
      transform: translateY(-2px);
      background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.12), rgba(255,255,255,0.03));
    }

    .social-circle svg {
      width: 34px;
      height: 34px;
      fill: white;
    }

    .mini-grid {
      margin-top: 26px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .mini-card {
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 14px 14px 15px;
      color: #fff;
    }

    .mini-card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .mini-card-desc {
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.68);
    }

    @media (max-width: 390px) {
      .hero {
        padding-left: 18px;
        padding-right: 18px;
      }

      .title {
        font-size: 26px;
      }

      .intro-box {
        font-size: 19px;
        padding: 22px 18px;
      }

      .primary-btn,
      .download-btn {
        min-height: 66px;
        font-size: 23px;
      }

      .social-circle {
        width: 72px;
        height: 72px;
      }
    }
  </style>
</head>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const drawer = document.getElementById('drawer');
    const shareBtn = document.getElementById('shareBtn');

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      drawer.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (!drawer.contains(e.target) && !menuBtn.contains(e.target)) {
        drawer.classList.remove('open');
      }
    });

    shareBtn.addEventListener('click', async () => {
      const shareData = {
        title: document.title,
        text: '欢迎查看我的页面',
        url: window.location.href,
      };

      try {
        if (navigator.share) {
          await navigator.share(shareData);
        } else if (navigator.clipboard) {
          await navigator.clipboard.writeText(window.location.href);
          alert('链接已复制');
        } else {
          alert(window.location.href);
        }
      } catch (err) {
        console.log(err);
      }
    });
  </script>
</body>
</html>
