<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aze Links</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #ffffff;
      --text: #111111;
      --subtext: #666666;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 30px 16px 36px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 460px;
    }

    .profile {
      text-align: center;
      margin-bottom: 22px;
    }

    .name {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.2;
      color: #111;
      margin-bottom: 8px;
    }

    .subname {
      font-size: 15px;
      color: #444;
      margin-bottom: 10px;
    }

    .bio {
      font-size: 14px;
      line-height: 1.8;
      color: var(--subtext);
      max-width: 360px;
      margin: 0 auto;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 24px;
    }

    .link-item {
      --main: #333;
      --card-bg: #fff;
      --card-border: #ececec;

      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      min-height: 78px;
      padding: 14px 18px;
      border-radius: 22px;
      text-decoration: none;
      color: var(--text);
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .link-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
    }

    .link-item:active {
      transform: scale(0.985);
    }

    .icon-box {
      flex: 0 0 54px;
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-box img {
      width: 46px;
      height: 46px;
      object-fit: contain;
      display: block;
    }

    .link-text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }

    .link-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
      color: #111;
    }

    .link-desc {
      margin-top: 4px;
      font-size: 12px;
      line-height: 1.4;
      color: #6b7280;
    }

    .arrow {
      flex: 0 0 auto;
      font-size: 22px;
      line-height: 1;
      color: var(--main);
      font-weight: 700;
    }

    .line {
      --main: #06c755;
      --card-bg: #eef9f1;
      --card-border: #c8eed3;
    }

    .instagram {
      --main: #ef3b7d;
      --card-bg: #fbf0f5;
      --card-border: #f5cddd;
    }

    .facebook {
      --main: #1877f2;
      --card-bg: #eef4ff;
      --card-border: #cfe0ff;
    }

    .youtube {
      --main: #ff2a2a;
      --card-bg: #fff3f3;
      --card-border: #ffd3d3;
    }

    .threads {
      --main: #111111;
      --card-bg: #f7f7f7;
      --card-border: #e5e5e5;
    }

    .tiktok {
      --main: #111111;
      --card-bg: #f7f7f7;
      --card-border: #e5e5e5;
    }

    .gmail {
      --main: #ea4335;
      --card-bg: #fff5f2;
      --card-border: #ffd8d1;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 22px;
      padding-bottom: 6px;
    }

    @media (max-width: 480px) {
      .page {
        padding: 24px 12px 30px;
      }

      .name {
        font-size: 26px;
      }

      .subname {
        font-size: 14px;
      }

      .bio {
        font-size: 13px;
      }

      .link-item {
        min-height: 72px;
        padding: 12px 15px;
        border-radius: 18px;
        gap: 12px;
      }

      .icon-box {
        width: 50px;
        height: 50px;
        flex-basis: 50px;
      }

      .icon-box img {
        width: 42px;
        height: 42px;
      }

      .link-title {
        font-size: 16px;
      }

      .link-desc {
        font-size: 11px;
      }

      .arrow {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="container">

      <div class="profile">
        <div class="name">阿澤古法健身</div>
        <div class="subname">歡迎聯絡我，查看我的社群平台與聯繫方式</div>
        <div class="bio">
          古法健康运动
        </div>
      </div>

      <div class="links">

        <a class="link-item line" href="https://line.me/ti/p/~your_line_id" target="_blank" rel="noopener noreferrer">
          <div class="icon-box">
            <img src="line.png" alt="LINE">
          </div>
          <div class="link-text">
            <div class="link-title">LINE</div>
            <div class="link-desc">一對一私訊聯絡</div>
          </div>
          <div class="arrow">›</div>
        </a>

        <a class="link-item instagram" href="https://www.instagram.com/llama.6952532/" target="_blank" rel="noopener noreferrer">
          <div class="icon-box">
            <img src="instagram.png" alt="Instagram">
          </div>
          <div class="link-text">
            <div class="link-title">Instagram</div>
            <div class="link-desc">追蹤最新內容</div>
          </div>
          <div class="arrow">›</div>
        </a>

        <a class="link-item facebook" href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer">
          <div class="icon-box">
            <img src="facebook.png" alt="Facebook">
          </div>
          <div class="link-text">
            <div class="link-title">Facebook</div>
            <div class="link-desc">查看更多資訊</div>
          </div>
          <div class="arrow">›</div>
        </a>

        <a class="link-item youtube" href="https://www.youtube.com/@aze1122-tw" target="_blank" rel="noopener noreferrer">
          <div class="icon-box">
            <img src="youtube.png" alt="YouTube">
          </div>
          <div class="link-text">
            <div class="link-title">YouTube</div>
            <div class="link-desc">觀看影片內容</div>
          </div>
          <div class="arrow">›</div>
        </a>

        <a class="link-item threads" href="https://www.threads.net/" target="_blank" rel="noopener noreferrer">
          <div class="icon-box">
            <img src="thread.png" alt="Threads">
          </div>
          <div class="link-text">
            <div class="link-title">Threads</div>
            <div class="link-desc">查看日常更新</div>
          </div>
          <div class="arrow">›</div>
        </a>

        <a class="link-item tiktok" href="https://www.tiktok.com/" target="_blank" rel="noopener noreferrer">
          <div class="icon-box">
            <img src="tiktok.png" alt="TikTok">
          </div>
          <div class="link-text">
            <div class="link-title">TikTok</div>
            <div class="link-desc">短影片與精華內容</div>
          </div>
          <div class="arrow">›</div>
        </a>

        <a class="link-item gmail" href="mailto:yourgmail@gmail.com">
          <div class="icon-box">
            <img src="gmail.png" alt="Gmail">
          </div>
          <div class="link-text">
            <div class="link-title">Gmail</div>
            <div class="link-desc">Email 聯絡我</div>
          </div>
          <div class="arrow">›</div>
        </a>

      </div>

      <div class="footer">© 2026 Aze</div>
    </div>
  </div>
</body>
</html>
