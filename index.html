<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>健康食谱领取</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;background:#fff;color:#111;text-align:center;}
  .container{padding:18px 16px;max-width:460px;margin:0 auto;}

  /* 页眉 */
  .navbar{display:flex;align-items:center;justify-content:space-between;padding:8px;}
  .navbar .icon{font-size:24px;cursor:pointer;}
  .navbar img{width:32px;}
  .share-btn{font-size:16px;color:#06c755;cursor:pointer;}

  /* 折叠菜单 */
  .menu{display:none;flex-direction:column;gap:10px;margin-top:8px;}
  .menu.open{display:flex;}
  .menu a{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:#f7f7f7;text-decoration:none;color:#111;font-size:15px;}

  /* 头像与文字 */
  .avatar{margin-top:32px;width:84px;height:84px;border-radius:50%;}
  .title{margin-top:24px;font-size:24px;font-weight:600;}
  .subtitle{margin-top:12px;font-size:15px;color:#666;line-height:1.6;}

  /* 按钮 */
  .btn-main{
    display:block;
    margin:24px auto 12px;
    width:100%;
    background:#06c755;
    color:#fff;
    font-size:18px;
    font-weight:600;
    padding:12px 0;
    border-radius:30px;
    text-decoration:none;
  }
  .btn-sub{
    display:block;
    margin-bottom:12px;
    width:100%;
    border:2px solid #06c755;
    color:#111;
    font-size:16px;
    font-weight:600;
    padding:10px 0;
    border-radius:30px;
    text-decoration:none;
  }

  /* 提示文字 */
  .footer-tips{margin-top:20px;font-size:14px;color:#666;}
  .footer-tips a{color:#06c755;text-decoration:underline;font-weight:500;}
</style>
</head>
<body>

<div class="container">

  <!-- 页眉 -->
  <div class="navbar">
    <div class="icon menu-toggle">☰</div>
    <img src="whatsapp-logo.png" alt="Logo">
    <div class="share-btn">分享</div>
  </div>

  <!-- 菜单 -->
  <div class="menu" id="navMenu">
    <a href="https://line.me/ti/p/~your_line_id">
      <img src="line.png" width="24"> LINE
    </a>
    <a href="https://www.instagram.com/your_profile">
      <img src="instagram.png" width="24"> Instagram
    </a>
    <a href="https://www.facebook.com/your_profile">
      <img src="facebook.png" width="24"> Facebook
    </a>
  </div>

  <!-- 主体 -->
  <img class="avatar" src="avatar.jpg" alt="头像">
  <div class="title">你的名字</div>
  <div class="subtitle">欢迎领取我的健康食谱<br>点击按钮即可加入 LINE</div>

  <a class="btn-main" href="https://line.me/ti/p/~your_line_id">领取健康食谱</a>
  <a class="btn-sub" href="https://line.me/ti/p/~your_line_id">加入 LINE 聊天</a>

  <div class="footer-tips">
    没有LINE？<a href="https://line.me/">立即下载</a>
  </div>

</div>

<script>
  document.querySelector('.menu-toggle').onclick = function(){
    document.getElementById('navMenu').classList.toggle('open');
  };
</script>

</body>
</html>
