<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>个人主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #ffffff;
      --text: #111111;
      --subtext: #666666;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 28px 16px 40px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 460px;
    }

    /* 页眉部分 */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: #f5f5f5;
    }

    .nav-left {
      font-size: 18px;
      cursor: pointer;
    }

    .nav-center img {
      width: 50px;
    }

    .nav-right .share-btn {
      background-color: #06c755;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }

    /* 个人信息部分 */
    .profile {
      text-align: center;
      margin-bottom: 26px;
    }

    .avatar-wrap {
      position: relative;
      width: 122px;
      height: 122px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-glow {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255, 153, 51, 0.34) 0%,
        rgba(255, 153, 51, 0.22) 22%,
        rgba(255, 153, 51, 0.13) 42%,
        rgba(255, 153, 51, 0.07) 60%,
        rgba(255, 153, 51, 0.03) 74%,
        rgba(255, 153, 51, 0) 86%
      );
      filter: blur(12px);
      animation: avatarGlow 2.6s ease-in-out infinite;
      pointer-events: none;
    }

    .avatar {
      position: relative;
      z-index: 2;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid #fff;
      background: #f5f5f5;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08), 0 0 0 4px rgba(255, 255, 255, 0.85);
    }

    @keyframes avatarGlow {
      0%, 100% {
        transform: scale(0.96);
        opacity: 0.78;
      }
      50% {
        transform: scale(1.06);
        opacity: 1;
      }
    }

    .name {
      font-size: 26px;
      font-weight: 800;
      color: #111;
      margin-bottom: 8px;
    }

    .bio {
      font-size: 14px;
      line-height: 1.8;
      color: var(--subtext);
      max-width: 360px;
      margin: 0 auto;
    }

    /* 社交平台按钮部分 */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 26px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      min-height: 62px;
      padding: 14px 18px;
      border-radius: 18px;
      text-decoration: none;
      color: var(--text);
      background: linear-gradient(135deg, #f8f8f8, #ffffff);
      border: 1.5px solid #ececec;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.04);
      transition: 0.2s ease;
    }

    .link-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.08);
    }

    .link-item:active {
      transform: scale(0.98);
      filter: brightness(0.97);
    }

    .icon-box {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-box img {
      width: 34px;
      height: 34px;
    }

    .link-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }

    .link-title {
      font-size: 16px;
      font-weight: 700;
    }

    .arrow {
      font-size: 20px;
      font-weight: 700;
    }

    /* 页脚部分 */
    .footer {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 22px;
      padding-bottom: 8px;
    }

  </style>
</head>
<body>
  <div class="page">
    <div class="container">

      <!-- 页眉部分 -->
      <header class="navbar">
        <div class="nav-left">导航</div>
        <div class="nav-center">
          <img src="line-logo.png" alt="LINE Logo" />
        </div>
        <div class="nav-right">
          <button class="share-btn">分享</button>
        </div>
      </header>

      <!-- 个人信息部分 -->
      <section class="profile">
        <div class="avatar-wrap">
          <span class="avatar-glow"></span>
          <img class="avatar" src="your-avatar.jpg" alt="Your Name" />
        </div>
        <div class="name">你的名字</div>
        <div class="bio">
          简短的个人简介，描述你是谁或你的品牌。<br>例如：古法·健康·运动
        </div>
      </section>

      <!-- 社交平台链接部分 -->
      <section class="links">
        <a class="link-item" href="https://line.me/ti/p/~your_line_id" target="_blank" rel="noopener noreferrer">
          <div class="icon-box">
            <img src="line.png" alt="LINE">
          </div>
          <div class="link-text">
            <div class="link-title">LINE</div>
            <div class="link-desc">一对一私讯联系</div>
          </div>
          <div class="arrow">›</div>
        </a>

        <a class="link-item" href="https://www.instagram.com/your_profile" target="_blank" rel="noopener noreferrer">
          <div class="icon-box">
            <img src="instagram.png" alt="Instagram">
          </div>
          <div class="link-text">
            <div class="link-title">Instagram</div>
            <div class="link-desc">查看最新内容</div>
          </div>
          <div class="arrow">›</div>
        </a>

        <!-- 你可以继续添加更多社交平台按钮 -->
      </section>

      <!-- 页脚部分 -->
      <footer class="footer">© 2026 你的品牌</footer>

    </div>
  </div>
</body>
</html>
