<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>A Feng Links</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #ffffff;
      color: #222;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 32px 18px 40px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 460px;
      text-align: center;
    }

    .profile {
      margin-bottom: 28px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 14px;
      border: 3px solid #fff;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      background: #f5f5f5;
    }

    .name {
      font-size: 26px;
      font-weight: 700;
      color: #111;
      margin-bottom: 8px;
    }

    .bio {
      font-size: 14px;
      line-height: 1.7;
      color: #666;
      max-width: 340px;
      margin: 0 auto;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 28px;
    }

    .link-item {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 16px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      background: #ffffff;
      color: #222;
      border: 1.5px solid #eeeeee;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
      transition: all 0.2s ease;
    }

    .link-item:hover {
      border-color: #ff8a00;
      color: #ff8a00;
      transform: translateY(-1px);
    }

    .link-item:active {
      background: #ff8a00;
      color: #ffffff;
      border-color: #ff8a00;
      transform: scale(0.98);
    }

    .footer {
      margin-top: 22px;
      font-size: 12px;
      color: #999;
    }

    @media (max-width: 480px) {
      .page {
        padding: 24px 14px 32px;
      }

      .avatar {
        width: 88px;
        height: 88px;
      }

      .name {
        font-size: 22px;
      }

      .bio {
        font-size: 13px;
      }

      .link-item {
        min-height: 54px;
        font-size: 15px;
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="container">

      <div class="profile">
        <img class="avatar" src="aze.jpg" alt="头像" />

        <div class="name">A Feng</div>

        <div class="bio">
          Instagram · Facebook · TikTok · YouTube<br>
          Welcome to my official links page
        </div>
      </div>

      <div class="links">
        <a class="link-item" href="mailto:yeaman7497.official@gmail.com">Email</a>
        <a class="link-item" href="https://www.instagram.com/" target="_blank">Instagram</a>
        <a class="link-item" href="https://www.youtube.com/" target="_blank">YouTube</a>
        <a class="link-item" href="https://www.facebook.com/" target="_blank">Facebook</a>
        <a class="link-item" href="https://www.threads.net/" target="_blank">Threads</a>
        <a class="link-item" href="https://www.tiktok.com/" target="_blank">TikTok</a>
        <a class="link-item" href="https://example.com/" target="_blank">Body Goals</a>
      </div>

      <div class="footer">
        © 2026 A Feng
      </div>

    </div>
  </div>
</body>
</html>
